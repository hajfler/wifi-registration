<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Registrierungen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f0f4f8; color: #1e293b; }

    /* Header */
    .topbar {
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .topbar h1 { color: #fff; font-size: 18px; font-weight: 700; }
    .topbar p { color: #a0b4d0; font-size: 13px; }
    .btn-logout {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.2); }

    /* Stats */
    .stats { display: flex; gap: 16px; padding: 24px 32px 0; }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 18px 24px;
      flex: 1;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .stat-card .value { font-size: 28px; font-weight: 700; color: #0f3460; }
    .stat-card .label { font-size: 12px; color: #64748b; font-weight: 500; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.4px; }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px 12px;
      gap: 12px;
    }
    .search-input {
      padding: 9px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      outline: none;
      width: 280px;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: #0f3460; }

    .filter-select {
      padding: 9px 12px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      outline: none;
      cursor: pointer;
    }

    /* Table */
    .table-wrapper {
      margin: 0 32px 32px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f8fafc; }
    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #e2e8f0;
    }
    td {
      padding: 13px 16px;
      font-size: 14px;
      border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-active { background: #dcfce7; color: #166534; }
    .badge-expired { background: #fee2e2; color: #991b1b; }
    .badge-permanent { background: #eff6ff; color: #1d4ed8; }

    .btn-revoke {
      background: #fee2e2;
      border: none;
      color: #991b1b;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-revoke:hover { background: #fecaca; }
    .btn-revoke:disabled { opacity: 0.4; cursor: not-allowed; }

    .empty-state {
      text-align: center;
      padding: 48px;
      color: #94a3b8;
      font-size: 15px;
    }

    .password-cell {
      font-family: monospace;
      font-size: 12px;
      color: #475569;
      background: #f8fafc;
      padding: 3px 8px;
      border-radius: 4px;
      display: inline-block;
    }

    @media (max-width: 768px) {
      .stats { flex-direction: column; padding: 16px; }
      .toolbar { flex-direction: column; align-items: stretch; padding: 12px 16px; }
      .search-input { width: 100%; }
      .table-wrapper { margin: 0 16px 24px; overflow-x: auto; }
      .topbar { padding: 12px 16px; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <div>
        <h1>📶 Admin – Registrierungen</h1>
        <p>WLAN-Registrierungsportal</p>
      </div>
    </div>
    <a href="/admin/logout" class="btn-logout">Abmelden</a>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="value" id="statTotal">–</div>
      <div class="label">Einträge total</div>
    </div>
    <div class="stat-card">
      <div class="value" id="statUsers">–</div>
      <div class="label">Eindeutige Personen</div>
    </div>
    <div class="stat-card">
      <div class="value" id="statActive" style="color:#166534">–</div>
      <div class="label">Aktive Zugänge</div>
    </div>
    <div class="stat-card">
      <div class="value" id="statExpired" style="color:#991b1b">–</div>
      <div class="label">Abgelaufen / Widerrufen</div>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-input" id="searchInput" placeholder="Suche nach Name, E-Mail, Telefon…">
    <select class="filter-select" id="filterSelect">
      <option value="all">Alle anzeigen</option>
      <option value="active">Nur aktive</option>
      <option value="inactive">Nur inaktive</option>
    </select>
  </div>

  <div class="table-wrapper">
    <table id="regTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>E-Mail</th>
          <th>Telefon</th>
          <th>Passwort</th>
          <th>Registriert</th>
          <th>Gültig bis</th>
          <th>Status</th>
          <th>Aktion</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="9" class="empty-state">Lade Daten…</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    let allData = [];

    function formatDate(iso) {
      if (!iso) return '–';
      return new Date(iso).toLocaleString('de-CH', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    function getStatus(row) {
      if (!row.is_active) return { label: 'Inaktiv', cls: 'badge-expired' };
      if (!row.expires_at) return { label: 'Dauerhaft', cls: 'badge-permanent' };
      if (new Date(row.expires_at) < new Date()) return { label: 'Abgelaufen', cls: 'badge-expired' };
      return { label: 'Aktiv', cls: 'badge-active' };
    }

    function render(data) {
      const tbody = document.getElementById('tableBody');
      if (!data.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty-state">Keine Einträge gefunden.</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(row => {
        const status = getStatus(row);
        const isRevokable = row.is_active;
        return `
          <tr>
            <td style="color:#94a3b8">${row.id}</td>
            <td><strong>${row.first_name} ${row.last_name}</strong></td>
            <td>${row.email}</td>
            <td>${row.phone}</td>
            <td><span class="password-cell">${row.password}</span></td>
            <td>${formatDate(row.created_at)}</td>
            <td>${row.expires_at ? formatDate(row.expires_at) : '<span style="color:#1d4ed8">Dauerhaft</span>'}</td>
            <td><span class="badge ${status.cls}">${status.label}</span></td>
            <td>
              <button class="btn-revoke" onclick="revoke(${row.id}, this)" ${isRevokable ? '' : 'disabled'}>
                ${isRevokable ? 'Widerrufen' : 'Inaktiv'}
              </button>
            </td>
          </tr>`;
      }).join('');
    }

    function applyFilters() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filter = document.getElementById('filterSelect').value;
      let data = allData.filter(row => {
        const text = `${row.first_name} ${row.last_name} ${row.email} ${row.phone}`.toLowerCase();
        if (search && !text.includes(search)) return false;
        if (filter === 'active' && !row.is_active) return false;
        if (filter === 'inactive' && row.is_active) return false;
        return true;
      });
      render(data);
    }

    async function load() {
      const res = await fetch('/admin/api/registrations');
      allData = await res.json();

      const now = new Date();
      const activeRows = allData.filter(r => r.is_active && (!r.expires_at || new Date(r.expires_at) > now));
      const uniqueEmails = new Set(allData.map(r => r.email)).size;
      document.getElementById('statTotal').textContent = allData.length;
      document.getElementById('statUsers').textContent = uniqueEmails;
      document.getElementById('statActive').textContent = activeRows.length;
      document.getElementById('statExpired').textContent = allData.length - activeRows.length;

      applyFilters();
    }

    async function revoke(id, btn) {
      if (!confirm('Zugang wirklich widerrufen? Der User kann sich damit nicht mehr verbinden.')) return;
      btn.disabled = true;
      btn.textContent = '…';
      const res = await fetch(`/admin/api/registrations/${id}`, { method: 'DELETE' });
      if (res.ok) {
        await load();
      } else {
        btn.disabled = false;
        btn.textContent = 'Widerrufen';
        alert('Fehler beim Widerrufen.');
      }
    }

    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.getElementById('filterSelect').addEventListener('change', applyFilters);

    load();
    // Alle 60 Sekunden auto-refresh
    setInterval(load, 60000);
  </script>
</body>
</html>
